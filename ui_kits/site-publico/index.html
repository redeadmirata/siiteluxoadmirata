<!-- @startingPoint section="Real estate" subtitle="Site público Admirata — home, listagem e detalhe do imóvel" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admirata Imóveis — Site público</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ─── Design Tokens — Admirata (espelha src/app/globals.css em produção) ─── */
  :root {
    --color-ink: #1a1a2e;
    --color-gold: #b8960c;
    --color-gold-light: #d4ac1a;
    --color-gold-dark: #8a6e09;
    --color-stone: #f5f0e8;
    --color-white: #ffffff;
    --color-text: #2b2b2b;
    --color-muted: #8a8a9a;
    --color-overlay: rgba(26, 26, 46, 0.55);

    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', Menlo, monospace;

    --section-padding: clamp(4rem, 8vw, 8rem);
    --container-max: 1440px;
    --container-pad: clamp(1.5rem, 5vw, 6rem);

    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    color: var(--color-text);
    background: var(--color-stone);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  img { max-width: 100%; height: auto; display: block; }
  button { font-family: inherit; cursor: pointer; }
  a { text-decoration: none; color: inherit; }
  ::selection { background: var(--color-gold); color: #fff; }

  /* Editorial type */
  .font-display { font-family: var(--font-display); }
  .font-mono { font-family: var(--font-mono); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--color-stone); }
  ::-webkit-scrollbar-thumb { background: var(--color-muted); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--color-ink); }

  /* Entrance anim */
  @keyframes adm-fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes adm-sweep { 0% { opacity: 0; } 12% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }

  /* Responsivo */
  .adm-show-mobile { display: none; }
  @media (max-width: 1080px) {
    .adm-nav-links, .adm-hide-mobile { display: none !important; }
    .adm-show-mobile { display: flex !important; }
  }
  @media (max-width: 860px) {
    .adm-footer-grid { grid-template-columns: 1fr 1fr !important; }
    .adm-pdi-grid { grid-template-columns: 1fr !important; }
    .adm-pdi-aside { position: static !important; }
  }
  @media (max-width: 560px) {
    .adm-footer-grid { grid-template-columns: 1fr !important; }
  }
  @keyframes adm-shape-enter {
    from { opacity: 0; transform: translateY(-120px); }
    to   { opacity: 1; transform: translateY(0);      }
  }
  @keyframes adm-shape-float {
    0%,100% { transform: translateY(0px);  }
    50%      { transform: translateY(18px); }
  }
  @keyframes adm-scroll-pulse { 0%,100%{opacity:0.2} 50%{opacity:0.8} }
  /* Gate de mercado */
  .adm-mkt-btn:hover { color: #fff !important; }
  .adm-gate-card:hover { transform: translateY(-4px); border-color: var(--color-gold) !important; }
  @media (max-width: 640px) {
    .adm-gate-grid { grid-template-columns: 1fr !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail"><svg viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg"><rect width="80" height="56" fill="#0c0e1a"/><rect x="12" y="18" width="24" height="2" rx="1" fill="#b8960c" opacity=".9"/><rect x="12" y="24" width="36" height="5" rx="1" fill="#fff" opacity=".85"/><rect x="12" y="32" width="28" height="2" rx="1" fill="#fff" opacity=".3"/><circle cx="66" cy="12" r="8" fill="none" stroke="#b8960c" stroke-width="1" opacity=".4"/><ellipse cx="20" cy="10" rx="14" ry="4" fill="none" stroke="#b8960c" stroke-width="1" opacity=".25" transform="rotate(-10 20 10)"/></svg></template>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="mercado.jsx"></script>
<script type="text/babel" src="sobre.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel">
  const mount = () => {
    if (!window.AdmirataSiteApp) return setTimeout(mount, 30);
    ReactDOM.createRoot(document.getElementById('root')).render(<window.AdmirataSiteApp />);
  };
  mount();
</script>
</body>
</html>
